function openTab(evt, tabName) {
    const contents = document.getElementsByClassName("tab-content");
    for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
    const btns = document.getElementsByClassName("tab-btn");
    for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");

    document.getElementById('mainClearBtn').style.display = (tabName === 'marketTab') ? 'block' : 'none';
    document.getElementById('mainRefreshBtn').style.display = (tabName === 'profitTab') ? 'block' : 'none';
}

function clearAllAnalysis() {
    document.getElementById('inputText').value = "";
    document.getElementById('resultArea').innerHTML = "";
    document.getElementById('timestamp').innerHTML = "";
}

function analyzePrice() {
    const text = document.getElementById('inputText').value;
    const regex = /\[(.+?)\]\s*\|\s*\d+\s*→\s*(\d+)/g;
    let results = { 1: [], 2: [], 3: [], 4: [] };
    let match;
    const now = new Date();
    const timeString = `${now.getFullYear()}년 ${String(now.getMonth() + 1).padStart(2, '0')}월 ${String(now.getDate()).padStart(2, '0')}일 ${now.getHours() >= 12 ? '오후' : '오전'} ${now.getHours() % 12 || 12}시 ${String(now.getMinutes()).padStart(2, '0')}분 기준`;
    document.getElementById('timestamp').innerHTML = timeString + " <<";
    while ((match = regex.exec(text)) !== null) {
        let name = match[1].trim();
        let currPrice = parseInt(match[2]);
        if (cookData[name]) {
            let target = cookData[name];
            let htmlContent = "";
            if (currPrice === target.max) htmlContent = `<span class="max-name">⭐ ${name}</span> <span class="symbol-info">「 💕최고가💕｜${currPrice} 」</span>`;
            else if (currPrice === target.max - 1) htmlContent = `<span class="minus1-name">⭐ ${name}</span> <span class="symbol-info">「 -1 원｜${currPrice} 」</span>`;
            else if (currPrice === target.max - 2) htmlContent = `<span class="minus2-name">⭐ ${name}</span> <span class="symbol-info">「 -2 원｜${currPrice} 」</span>`;
            if (htmlContent !== "") results[target.tier].push(htmlContent);
        }
    }
    renderMarketResults(results);
}

function renderMarketResults(data) {
    let html = "";
    for (let i = 1; i <= 4; i++) {
        html += `<div class="tier-section"><div class="tier-title" style="border-bottom: 1px solid #444; padding-bottom: 8px; margin-bottom: 10px; border-left:none; margin:0; padding-left:0; font-size:18px; text-align:left;">${i}차 요리</div>`;
        if (data[i].length === 0) html += `<div class="empty-msg">기다림의 미학... 고점아 힘내자 ( •̀ ω •́ )</div>`;
        else data[i].forEach(itemHtml => { html += `<div class="item-row">${itemHtml}</div>`; });
        html += `</div>`;
    }
    document.getElementById('resultArea').innerHTML = html;
}

function formatVal(num) { return num === 0 ? "0" : Number(num.toFixed(2)).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 }); }
function formatRound(num) { return Math.round(num).toLocaleString(); }

function handleInput(el, type, name) {
    let rawVal = el.value.replace(/[^0-9]/g, '');
    if (rawVal === "") rawVal = "0";
    el.value = parseInt(rawVal).toLocaleString();
    const numericVal = parseInt(rawVal);
    
    savedIngredientPrices[name] = numericVal;
    localStorage.setItem(INGREDIENT_PRICE_KEY, JSON.stringify(savedIngredientPrices));

    if (type === 'A') calculateA(name, numericVal);
    else calculateB(name, numericVal);
}

function calculateA(name, price) {
    const safeId = name.replace(/\//g, '').replace(/ /g, '');
    const row = document.getElementById(`row-${safeId}`);
    const config = groupA_Config.find(m => m.name === name);
    const unitPrice = price / config.conv;
    unitPrices[name] = unitPrice;
    if(row) {
        row.querySelector('.val-1').innerText = formatVal(unitPrice);
        row.querySelector('.val-32').innerText = formatVal(unitPrice * 32);
        row.querySelector('.val-64').innerText = formatVal(unitPrice * 64);
        if (config.hasSub) {
            const subRow = document.getElementById(`sub-${safeId}`);
            if(subRow) {
                subRow.querySelector('.val-set1').innerText = formatVal(price / 27);
                subRow.querySelector('.val-set3').innerText = formatVal(price / 9);
            }
        }
    }
}

function calculateB(name, price) {
    const safeId = name.replace(/ /g, '');
    const row = document.getElementById(`row-${safeId}`);
    const price64 = price / 9; 
    const unitPrice = price64 / 64;
    unitPrices[name] = unitPrice;
    if(row) {
        row.querySelector('.val-box1').innerText = formatVal(unitPrice * 9);
        row.querySelector('.val-32').innerText = formatVal(unitPrice * 32);
        row.querySelector('.val-64').innerText = formatVal(price64);
        const subRow = document.getElementById(`sub-b-${safeId}`);
        if(subRow) {
            subRow.querySelector('.val-set3').innerText = formatVal(price * 3);
            subRow.querySelector('.val-line1').innerText = formatVal(price * 9);
            subRow.querySelector('.val-line2').innerText = formatVal(price * 18);
            subRow.querySelector('.val-shulker').innerText = formatVal(price * 27);
        }
    }
}

function toggleActive(name) {
    activeStatus[name] = !activeStatus[name];
    localStorage.setItem('cookActiveStatus', JSON.stringify(activeStatus));
}

function updateProfits() {
    const container = document.getElementById('tierContainer');
    if(!container) return;
    container.innerHTML = '';
    for (let t = 1; t <= 4; t++) {
        const tierRecipes = recipes.filter(r => r.tier === t && activeStatus[r.name]).map(r => {
            let unitCost = 0;
            for (let ing in r.ing) unitCost += (unitPrices[ing] || 0) * r.ing[ing];
            const cost32 = unitCost * 32;
            const profit32 = (r.sell * 32) - cost32;
            return { ...r, cost32, profit32, hourProfit: profit32 * 24 };
        }).sort((a, b) => b.profit32 - a.profit32);

        let rank = 1;
        for (let i = 0; i < tierRecipes.length; i++) {
            if (i > 0 && tierRecipes[i].profit32 < tierRecipes[i-1].profit32) rank = i + 1;
            tierRecipes[i].currentRank = rank;
        }

        const section = document.createElement('div');
        section.innerHTML = `<div class="tier-title">${t}차 요리 순위</div>
            <table><thead><tr><th class="rank-col">순위</th><th style="width:35%">요리명</th><th>최고 판매가/재료원가</th><th>1회 순수익</th><th style="color:#ffca28">1시간 순수익</th></tr></thead>
            <tbody>${tierRecipes.map((r) => {
                const rowClass = r.currentRank <= 3 ? `rank-${r.currentRank}-row` : '';
                return `<tr class="${rowClass}"><td class="rank-col"><span class="rank-text">${r.currentRank}위</span></td>
                    <td class="recipe-name-td">
                        <input type="checkbox" class="cook-chk" ${activeStatus[r.name] ? 'checked' : ''} onclick="toggleActive('${r.name}')">
                        ${r.name}<span class="recipe-info">(${r.txt})</span>
                    </td>
                    <td class="minor-col">${r.sell} / ${formatRound(r.cost32)}</td>
                    <td class="profit-val">${formatRound(r.profit32)}원</td>
                    <td class="hour-val">${formatRound(r.hourProfit)}원</td></tr>`;
            }).join('')}
            ${recipes.filter(r => r.tier === t && !activeStatus[r.name]).map(r => `
                <tr style="opacity: 0.5;">
                    <td class="rank-col">-</td>
                    <td class="recipe-name-td">
                        <input type="checkbox" class="cook-chk" onclick="toggleActive('${r.name}')">
                        ${r.name} <span style="font-size:11px;">(비활성)</span>
                    </td>
                    <td colspan="3" style="text-align:center; font-size:12px; color:#666;">순위에서 제외됨</td>
                </tr>
            `).join('')}
            </tbody></table>`;
        container.appendChild(section);
    }
}

/* [커스텀 재료 계산기 통합 스크립트] */

// 데이터 수정: 해산물 섹션 추가
const cropData = [
    { id: "tier3", title: "3티어 작물", items: ["고구마", "무", "콩", "블루베리"] },
    { id: "tier2", title: "2티어 작물", items: ["마늘", "옥수수", "딸기", "파"] },
    { id: "tier1", title: "1티어 작물", items: ["양상추", "토마토"] },
    { id: "seafood", title: "해산물", items: ["굴", "미역", "전복", "홍합"] } // 추가된 섹션
];

const CROP_STORAGE_KEY = 'sungnyung_crop_prices_v2';
let savedPrices = JSON.parse(localStorage.getItem(CROP_STORAGE_KEY)) || {};

function initCalculator() {
    const container = document.getElementById('calculatorBody');
    if(!container) return;
    container.innerHTML = '';
    let currentRow = 0;

    cropData.forEach((tier) => {
        const section = document.createElement('div');
        section.innerHTML = `
            <div class="calc-tier-header">
                <h3 class="calc-tier-title">${tier.title}</h3>
                <div class="calc-batch-controls">
                    <label class="calc-lock-wrapper">
                        <input type="checkbox" class="lock-chk" onchange="toggleTierLock('${tier.id}', this.checked)"> 매입가 고정 🔒
                    </label>
                    <div class="calc-batch-input-wrap">
                        <span class="calc-batch-label">매입가 일괄 입력:</span>
                        <input type="text" class="calc-batch-input nav-input tier-batch-${tier.id}" placeholder="0" 
                            data-r="${currentRow}" data-c="0"
                            onfocus="this.select()" 
                            oninput="applyBatchPrice('${tier.id}', this.value)">
                    </div>
                </div>
            </div>
        `;
        container.appendChild(section);
        currentRow++;

        const table = document.createElement('table');
        // 이름 수정: 재료명, 금액
        table.innerHTML = `
            <thead>
                <tr><th>재료명</th><th style="width:25%">매입가</th><th style="width:20%">구매수량</th><th style="width:25%">금액</th></tr>
            </thead>
            <tbody>
                ${tier.items.map((name, idx) => {
                    const r = currentRow + idx;
                    return `
                        <tr data-tier="${tier.id}">
                            <td class="calc-row-name">${name}</td>
                            <td>
                                <input type="text" class="input-price nav-input tier-price-${tier.id}" 
                                    data-name="${name}" data-r="${r}" data-c="0"
                                    value="${(savedPrices[name] || 0).toLocaleString()}" 
                                    onfocus="this.select()" oninput="calculateRowPrice('${name}')">
                            </td>
                            <td>
                                <input type="text" class="input-qty nav-input" 
                                    data-name="${name}" data-r="${r}" data-c="1"
                                    value="0" 
                                    onfocus="this.select()" oninput="calculateRowPrice('${name}')">
                            </td>
                            <td><span id="total-${name}" class="calc-price-text">0</span><span class="calc-unit">원</span></td>
                        </tr>
                    `;
                }).join('')}
            </tbody>
        `;
        container.appendChild(table);
        currentRow += tier.items.length;
    });

    document.addEventListener('keydown', handleCalcNavKeyDown);
}

function toggleTierLock(tierId, isLocked) {
    const batchInput = document.querySelector(`.tier-batch-${tierId}`);
    const priceInputs = document.querySelectorAll(`.tier-price-${tierId}`);
    if(batchInput) batchInput.readOnly = isLocked;
    priceInputs.forEach(input => {
        input.readOnly = isLocked;
        input.tabIndex = isLocked ? -1 : 0;
    });
}

function handleCalcNavKeyDown(e) {
    const cur = e.target;
    if (!cur.classList.contains('nav-input')) return;

    let r = parseInt(cur.dataset.r);
    let c = parseInt(cur.dataset.c);
    let next;

    const findNext = (row, col, direction) => {
        let nextEl = document.querySelector(`.nav-input[data-r="${row}"][data-c="${col}"]`);
        if (nextEl && nextEl.readOnly) {
            if (direction === 'ArrowRight' || direction === 'Enter') return findNext(row, col + 1, direction) || findNext(row + 1, 0, direction);
            if (direction === 'ArrowLeft') return findNext(row, col - 1, direction);
            if (direction === 'ArrowDown') return findNext(row + 1, col, direction);
            if (direction === 'ArrowUp') return findNext(row - 1, col, direction);
        }
        return nextEl;
    };

    switch(e.key) {
        case 'ArrowRight': next = findNext(r, c + 1, e.key); break;
        case 'ArrowLeft':  next = findNext(r, c - 1, e.key); break;
        case 'ArrowDown':  e.preventDefault(); next = findNext(r + 1, c, e.key); break;
        case 'ArrowUp':    e.preventDefault(); next = findNext(r - 1, c, e.key); break;
        case 'Enter':
            e.preventDefault();
            if (c === 0 && !cur.classList.contains('calc-batch-input')) next = findNext(r, 1, e.key);
            else next = findNext(r + 1, 0, e.key);
            break;
    }
    if (next) next.focus();
}

function applyBatchPrice(tierId, val) {
    const price = parseInt(val.replace(/[^0-9]/g, '')) || 0;
    const tierRows = document.querySelectorAll(`tr[data-tier="${tierId}"]`);
    tierRows.forEach(row => {
        const priceInput = row.querySelector('.input-price');
        if(priceInput) {
            priceInput.value = price.toLocaleString();
            calculateRowPrice(priceInput.dataset.name);
        }
    });
}

function calculateRowPrice(name) {
    const priceInput = document.querySelector(`.input-price[data-name="${name}"]`);
    const qtyInput = document.querySelector(`.input-qty[data-name="${name}"]`);
    const totalSpan = document.getElementById(`total-${name}`);
    if(!priceInput || !qtyInput) return;
    let price = parseInt(priceInput.value.replace(/[^0-9]/g, '')) || 0;
    let qty = parseInt(qtyInput.value.replace(/[^0-9]/g, '')) || 0;
    priceInput.value = price.toLocaleString();
    qtyInput.value = qty.toLocaleString();
    totalSpan.innerText = (price * qty).toLocaleString();
    savedPrices[name] = price;
    localStorage.setItem(CROP_STORAGE_KEY, JSON.stringify(savedPrices));
    updateGrandTotal();
}

function updateGrandTotal() {
    let grandTotal = 0;
    document.querySelectorAll('.calc-price-text').forEach(span => {
        grandTotal += parseInt(span.innerText.replace(/[^0-9]/g, '')) || 0;
    });
    const gtEl = document.getElementById('grandTotal');
    if(gtEl) gtEl.innerText = grandTotal.toLocaleString();
}

function resetQuantities() {
    document.querySelectorAll('.input-qty').forEach(input => {
        input.value = "0";
        calculateRowPrice(input.dataset.name);
    });
}

/* [메인 초기화 실행] */
/* ----------------------------------------------------------- */
function init() {
    document.getElementById('mainClearBtn').style.display = 'block';

    const aBody = document.getElementById('groupABody');
    groupA_Config.forEach(m => {
        const safeId = m.name.replace(/\//g, '').replace(/ /g, '');
        const displayPrice = (savedIngredientPrices[m.name] !== undefined) ? savedIngredientPrices[m.name] : m.initial;
        
        const tr = document.createElement('tr');
        tr.id = `row-${safeId}`;
        tr.innerHTML = `<td style="text-align:left; padding-left:15px;"><b>${m.name}</b>${m.label ? `<span class="special-label">${m.label}</span>` : ''}</td>
            <td><input type="text" class="price-input" value="${displayPrice.toLocaleString()}" oninput="handleInput(this, 'A', '${m.name}')"></td>
            <td><span class="val-1 highlight">0</span><span class="unit-text">원</span></td>
            <td><span class="val-32 highlight">0</span><span class="unit-text">원</span></td>
            <td><span class="val-64 highlight price-main">0</span><span class="unit-text">원</span></td>`;
        aBody.appendChild(tr);
        if (m.hasSub) {
            const subTr = document.createElement('tr');
            subTr.id = `sub-${safeId}`; subTr.className = 'sub-row';
            subTr.innerHTML = `<td colspan="2"></td><td colspan="3" style="text-align:left; padding-left:15px;"><span class="gap"><span class="sub-label">상자 1세트:</span><span class="val-set1 sub-val">0</span>원</span><span class="gap"><span class="sub-label">상자 3세트:</span><span class="val-set3 sub-val">0</span>원</span></td>`;
            aBody.appendChild(subTr);
        }
        calculateA(m.name, displayPrice);
    });

    const bBody = document.getElementById('groupBBody');
    groupB_Config.forEach(item => {
        const safeId = item.name.replace(/ /g, '');
        const displayPrice = (savedIngredientPrices[item.name] !== undefined) ? savedIngredientPrices[item.name] : item.initial;

        const tr = document.createElement('tr');
        tr.id = `row-${safeId}`;
        tr.innerHTML = `<td style="text-align:left; padding-left:15px;"><b>${item.name}</b></td>
            <td><input type="text" class="price-input" value="${displayPrice.toLocaleString()}" oninput="handleInput(this, 'B', '${item.name}')"></td>
            <td><span class="val-box1 highlight">0</span><span class="unit-text">원</span></td>
            <td><span class="val-32 highlight">0</span><span class="unit-text">원</span></td>
            <td><span class="val-64 highlight price-main">0</span><span class="unit-text">원</span></td>`;
        bBody.appendChild(tr);
        const subTr = document.createElement('tr');
        subTr.id = `sub-b-${safeId}`; subTr.className = 'sub-row';
        subTr.innerHTML = `<td colspan="2"></td><td colspan="3" style="text-align:left; padding-left:15px;"><span class="gap"><span class="sub-label">3세트:</span><span class="val-set3 sub-val">0</span>원</span><span class="gap"><span class="sub-label">9세트:</span><span class="val-line1 sub-val">0</span>원</span><span class="gap"><span class="sub-label">18세트:</span><span class="val-line2 sub-val">0</span>원</span><span class="gap"><span class="sub-label">1셜커:</span><span class="val-shulker sub-val">0</span>원</span></td>`;
        bBody.appendChild(subTr);
        calculateB(item.name, displayPrice);
    });

    const allInputs = document.querySelectorAll('.price-input');
    allInputs.forEach((input, index) => {
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const nextInput = allInputs[index + 1];
                if (nextInput) { nextInput.focus(); nextInput.select(); } 
                else { input.blur(); }
            }
        });
    });

    updateProfits();
    initCalculator();
}
init();
